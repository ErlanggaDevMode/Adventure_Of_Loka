<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adventure Of Loka - Lari, Serang, Bertahan</title>
  <meta name="description" content="Mainkan game Adventure Of Loka. Lari, lompat, menghindar, dan serang musuh di jalanan kota modern. Rasakan adrenalin tanpa henti!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0e15;
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
    }
    #game-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }
    /* UI Overlay Container */
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }
    .ui-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition: opacity 0.4s ease, transform 0.4s ease;
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }
    .ui-screen.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    /* Glassmorphism card */
    .glass-card {
      background: rgba(20, 21, 33, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      max-width: 550px;
      width: 90%;
      animation: float 6s ease-in-out infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    /* Typography */
    h1 {
      font-size: 3rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ff007f 0%, #7f00ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 8px rgba(255, 0, 127, 0.3));
      margin-bottom: 10px;
    }
    h2 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #ef4444;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: 20px;
    }
    .score-summary {
      font-size: 1.3rem;
      margin: 10px 0;
      color: #f1f5f9;
    }
    .score-summary span {
      font-weight: 800;
      color: #38bdf8;
    }
    /* Buttons */
    .btn {
      background: linear-gradient(135deg, #ff007f 0%, #7f00ff 100%);
      color: #ffffff;
      border: none;
      padding: 16px 36px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 25px rgba(255, 0, 127, 0.4);
      transition: all 0.3s ease;
      outline: none;
    }
    .btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 15px 30px rgba(255, 0, 127, 0.6);
    }
    .btn:active {
      transform: translateY(1px);
    }
    /* Instructions */
    .controls-info {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      gap: 10px;
    }
    .control-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .key-cap {
      background: #1e293b;
      border: 2px solid #334155;
      border-bottom-width: 5px;
      border-radius: 8px;
      padding: 6px 12px;
      font-family: monospace;
      font-size: 0.9rem;
      font-weight: bold;
      color: #f1f5f9;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .action-name {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      font-weight: 600;
    }
    /* HUD overlay styling */
    .hud-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .hud-overlay.active {
      opacity: 1;
    }
    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .score-container {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      margin-left: auto;
    }
    .score-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      font-weight: 600;
    }
    .score-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
    }
    .hud-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      width: 100%;
    }
    .reminders {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      display: flex;
      gap: 15px;
    }
    .reminder-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .reminder-key {
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      font-weight: bold;
      color: #38bdf8;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-container"></div>
  
  <script type="module" src="/main.js"></script>
</body>
</html>
